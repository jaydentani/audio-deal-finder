name: Audio Deal Finder Bot

on:
  schedule:
    - cron: '*/20 * * * *'  # Runs automatically every 20 minutes
  workflow_dispatch:        # Allows you to trigger it manually from GitHub

# 🔑 Grants write permissions so the bot can push seen_listings.json back to the repo
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Deal Finder Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python bot.py

      - name: Commit and Push Updated Seen Listings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add seen_listings.json
          git commit -m "Auto-update seen listings [skip ci]" || exit 0
          git push
